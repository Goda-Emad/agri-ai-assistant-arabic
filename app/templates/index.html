<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri AI Assistant - Smart Farming Advisor</title>
    <meta name="description" content="AI-powered agriculture assistant. Get expert advice on crops, pest control, soil health, weather, and farming practices. Supports voice, text, and image analysis.">
    <meta name="keywords" content="agriculture, farming, crops, pest control, soil health, AI assistant, chatbot, fertilizers, irrigation">
    <meta name="author" content="Goda Emad">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#1f1a12">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://your-domain.com/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-domain.com/">
    <meta property="og:title" content="Agri AI Assistant - Smart Farming Advisor">
    <meta property="og:description" content="Get expert AI-powered advice on crops, pest control, soil health, weather, and farming practices. Supports voice, text, and image-based crop disease diagnosis.">
    <meta property="og:image" content="{{ url_for('static', filename='images/og-image.png') }}">
    <meta property="og:site_name" content="Agri AI Assistant">
    <meta property="og:locale" content="ar_EG">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://your-domain.com/">
    <meta name="twitter:title" content="Agri AI Assistant - Smart Farming Advisor">
    <meta name="twitter:description" content="AI-powered agriculture assistant. Voice, text, and image-based crop advisory.">
    <meta name="twitter:image" content="{{ url_for('static', filename='images/og-image.png') }}">

    <!-- AI Crawlers -->
    <meta name="llms-txt" content="/llms.txt">
    <meta name="ai-content-declaration" content="human-reviewed">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Agri AI Assistant",
        "alternateName": "AI Agriculture Assistant",
        "url": "https://your-domain.com",
        "description": "AI-powered agriculture assistant. Get expert advice on crops, pest control, soil health, weather, and farming practices.",
        "applicationCategory": "AgricultureApplication",
        "operatingSystem": "Web Browser",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        },
        "author": {
            "@type": "Person",
            "name": "Goda Emad",
            "url": "https://www.linkedin.com/in/goda-emad/",
            "sameAs": [
                "https://github.com/Goda-Emad",
                "https://www.linkedin.com/in/goda-emad/"
            ]
        },
        "inLanguage": ["en", "ar"],
        "featureList": [
            "AI Crop Disease Diagnosis",
            "Voice Input & Output",
            "Agricultural Advisory",
            "Image Analysis",
            "Multilingual Support"
        ],
        "screenshot": "{{ url_for('static', filename='images/og-image.png') }}"
    }
    </script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
            {
                "@type": "Question",
                "name": "What is Agri AI Assistant?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Agri AI Assistant is an AI-powered agriculture assistant that helps farmers with crop advice, pest control, soil health, and weather information."
                }
            },
            {
                "@type": "Question",
                "name": "Can Agri AI Assistant diagnose crop diseases from photos?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Yes, you can upload a photo of your crops and Agri AI Assistant will analyze it using AI vision to identify diseases, pests, and nutrient deficiencies."
                }
            },
            {
                "@type": "Question",
                "name": "Is Agri AI Assistant free to use?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Yes, Agri AI Assistant is completely free to use. It provides AI-powered agricultural advisory at no cost."
                }
            }
        ]
    }
    </script>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/Digilians.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/Digilians.ico') }}">
    <link rel="author" href="https://github.com/Goda-Emad">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
</head>
<body>

    <!-- ========== NAVBAR ========== -->
<nav class="navbar">
    <div class="nav-inner">
        <a class="brand" href="/">
            <span class="brand-icon"><img src="{{ url_for('static', filename='images/Digilians.ico') }}" alt="Logo" style="width:100%;height:100%;object-fit:contain;border-radius:10px;"></span>
            <span>Agri AI Assistant</span>
        </a>
        <div class="nav-actions">
            <button class="nav-btn" id="clearBtn" title="Clear conversation">
                <i class="bi bi-trash3"></i><span class="btn-label">New Chat</span>
            </button>
            <button class="nav-btn" id="themeToggle" title="Toggle theme">
                <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
            </button>
            <img src="{{ url_for('static', filename='images/goda.jpg') }}" alt="Goda Emad" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);box-shadow:0 0 10px rgba(107,156,79,.3);margin-right:4px;">
        </div>
    </div>
</nav>
    <!-- ========== MAIN ========== -->
    <main class="main">
        <div class="chat-card">

            <!-- Header -->
            <div class="card-header">
                <div class="header-left">
                    <div class="avatar"><img src="{{ url_for('static', filename='images/Digilians.ico') }}" alt="Logo" style="width:100%;height:100%;object-fit:contain;border-radius:11px;"></div>
                    <div>
                        <h5>Agri AI Assistant</h5>
                        <span class="status"><i class="bi bi-circle-fill"></i> Online</span>
                    </div>
                </div>
                <span class="date" id="dateDisplay"></span>
            </div>

            <!-- Messages -->
            <div class="messages" id="chatMessages"></div>

            <!-- Typing -->
            <div class="typing" id="typingIndicator">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <span class="typing-label">Thinking...</span>
            </div>

            <!-- Image Preview -->
            <div class="image-preview" id="imagePreview">
                <img id="previewImg" src="" alt="Preview">
                <button class="remove-image" id="removeImage" title="Remove image"><i class="bi bi-x-lg"></i></button>
            </div>

            <!-- Input -->
            <div class="input-bar">
                <button class="icon-btn" id="imageBtn" title="Upload image">
                    <i class="bi bi-image"></i>
                </button>
                <input type="file" id="imageInput" accept="image/*" class="d-none" title="Upload image" aria-label="Upload image">
                <button class="icon-btn mic" id="voiceBtn" title="Record voice">
                    <i class="bi bi-mic"></i>
                </button>
                <form id="chatForm" class="input-row" autocomplete="off">
                    <input type="text" class="chat-input" id="userInput"
                           placeholder="Ask about crops, pests, soil, or send a photo..." aria-label="Message">
                    <button type="submit" class="send-btn" id="sendBtn" title="Send message">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </form>
            </div>

        </div>
    </main>

    <!-- Audio Player -->
    <audio id="audioPlayer" class="d-none"></audio>

    <!-- Footer -->
    <footer class="footer">
        <p>Made with <i class="bi bi-heart-fill footer-heart"></i> by
            <a href="https://www.linkedin.com/in/goda-emad/" target="_blank" rel="noopener">Goda Emad</a>
            &middot;
            <a href="https://github.com/Goda-Emad" target="_blank" rel="noopener" title="GitHub"><i class="bi bi-github"></i></a>
            <a href="https://www.linkedin.com/in/goda-emad/" target="_blank" rel="noopener" class="ms-1" title="LinkedIn"><i class="bi bi-linkedin"></i></a>
        </p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
